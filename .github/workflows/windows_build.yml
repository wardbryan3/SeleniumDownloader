name: Build Windows Executable with PyInstaller

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bump patch version
        id: bump
        run: |
          VERSION_FILE="__init__.py"
          CONTENT=$(cat "$VERSION_FILE")
          MAJOR=$(echo "$CONTENT" | sed -nE 's/__version__\s*=\s*"([0-9]+)\.([0-9]+)\.([0-9]+)"/\1/p')
          MINOR=$(echo "$CONTENT" | sed -nE 's/__version__\s*=\s*"([0-9]+)\.([0-9]+)\.([0-9]+)"/\2/p')
          PATCH=$(echo "$CONTENT" | sed -nE 's/__version__\s*=\s*"([0-9]+)\.([0-9]+)\.([0-9]+)"/\3/p')
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          sed -i "s/__version__ = \"${MAJOR}\.${MINOR}\.${PATCH}\"/__version__ = \"${NEW_VERSION}\"/" "$VERSION_FILE"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add __init__.py
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git tag ${{ steps.bump.outputs.new_version }}
          git push origin main --tags

  build:
    needs: version
    if: always()
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_version || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build with PyInstaller using .spec file
        run: |
          pyinstaller --clean AudioDownloader.spec

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Audio-Downloader
          path: dist/
          retention-days: 5

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_version }}
          name: Version ${{ needs.version.outputs.new_version }}
          body: "Release ${{ needs.version.outputs.new_version }} built from GitHub Actions"
          files: |
            dist/AudioDownloader.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}