name: Build Windows Executable with PyInstaller

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Bump patch version
        id: bump
        run: |
          LATEST_TAG=$(git tag --sort=-creatordate | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "0.0.0")
          MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Tag version
        run: |
          if git rev-parse ${{ steps.bump.outputs.new_version }} >/dev/null 2>&1; then
            echo "Tag ${{ steps.bump.outputs.new_version }} already exists, skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            sed -i "s/__version__ = .*/__version__ = \"${{ steps.bump.outputs.new_version }}\"/" audio_downloader/__init__.py
            git add audio_downloader/__init__.py
            git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
            git tag ${{ steps.bump.outputs.new_version }}
            git push origin ${{ steps.bump.outputs.new_version }}
          fi

  build:
    needs: version
    if: always()
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.new_version || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Build with PyInstaller using .spec file
        run: |
          pyinstaller --clean AudioDownloader.spec

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Audio-Downloader
          path: dist/
          retention-days: 5

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_version }}
          name: Version ${{ needs.version.outputs.new_version }}
          body: "Release ${{ needs.version.outputs.new_version }} built from GitHub Actions"
          files: |
            dist/AudioDownloader.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}