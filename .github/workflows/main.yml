name: Build Windows Executable with PyInstaller

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allow manual trigger

jobs:
  build:
    runs-on: windows-latest   # or windows-2019 / windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # adjust as needed

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # If you have a requirements.txt file, install it:
          if exist requirements.txt pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          # Example: single‑file executable from main.py
          pyinstaller --onefile --name myapp main.py
          # If you have a .spec file, use:
          pyinstaller myapp.spec

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-executable
          path: dist/   # PyInstaller outputs into the 'dist' folder
